<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Política de Cookies · Hestía Your Home</title>
  <meta name="description" content="Política de cookies de Hestía Your Home. Solo usamos cookies esenciales para el funcionamiento de la web."/>
  <meta name="robots" content="noindex, follow"/>
  <link rel="canonical" href="https://www.hestiayourhome.com/cookies.html"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/styles.css?v=105"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>
  window.__LEGAL__ = 'cookies';
  window.__TWEAKS__ = { starfield: true, parallax: false };

  const COMPONENT_FILES = [
    'components/shared.jsx',
    'components/chrome.jsx',
    'components/legal-page.jsx',
  ];

  async function loadComponents() {
    for (const file of COMPONENT_FILES) {
      const res = await fetch(file + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to load ${file}: ${res.status}`);
      const code = await res.text();
      const transformed = Babel.transform(code, { presets: ['react'] }).code;
      // eslint-disable-next-line no-eval
      eval(transformed);
    }
  }

  loadComponents().catch(err => {
    document.getElementById('root').innerHTML =
      `<div style="padding:40px;font-family:sans-serif;color:#c00">
        <b>Error loading components:</b><br>${err.message}
      </div>`;
    console.error(err);
  });
</script>
</body>
</html>
