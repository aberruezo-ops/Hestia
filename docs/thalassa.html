  <link rel="stylesheet" href="assets/styles.css?v=58"/>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Accommodation",
    "name": "Hestía Thalassa",
    "description": "Apartamento ático con terraza panorámica 360° y SPA comunitario. 2 habitaciones, 6 plazas + bebé. Vera Playa, Almería.",
    "url": "https://hestiayourhome.com/thalassa.html",
    "numberOfRooms": 2,
    "occupancy": {"@type": "QuantitativeValue", "maxValue": 7},
    "amenityFeature": [
      {"@type": "LocationFeatureSpecification", "name": "Terraza panorámica 360°", "value": true},
      {"@type": "LocationFeatureSpecification", "name": "Vistas al mar y al Salar de los Canos", "value": true},
      {"@type": "LocationFeatureSpecification", "name": "SPA comunitario", "value": true},
      {"@type": "LocationFeatureSpecification", "name": "Sauna", "value": true},
      {"@type": "LocationFeatureSpecification", "name": "Pádel", "value": true},
      {"@type": "LocationFeatureSpecification", "name": "Mascotas permitidas", "value": true},
      {"@type": "LocationFeatureSpecification", "name": "WiFi", "value": true}
    ],
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Calle Islas Canarias 7",
      "addressLocality": "Vera Playa",
      "addressRegion": "Almería",
      "postalCode": "04621",
      "addressCountry": "ES"
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "10",
      "bestRating": "10",
      "worstRating": "1",
      "reviewCount": "120"
    },
    "containedInPlace": {
      "@type": "LodgingBusiness",
      "name": "Hestía Your Home",
      "url": "https://hestiayourhome.com"
    }
  }
  </script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>
  window.__APT__ = 'vt';
  window.__TWEAKS__ = { starfield: true, parallax: true };

  const COMPONENT_FILES = [
    'components/shared.jsx',
    'components/chrome.jsx',
    'components/sections-2.jsx',
    'components/calendar.jsx',
    'components/apartment-page.jsx',
  ];

  async function loadComponents() {
    for (const file of COMPONENT_FILES) {
      const res = await fetch(file + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to load ${file}: ${res.status}`);
      const code = await res.text();
      const transformed = Babel.transform(code, { presets: ['react'] }).code;
      // eslint-disable-next-line no-eval
      eval(transformed);
    }
  }

  loadComponents().catch(err => {
    document.getElementById('root').innerHTML =
      `<div style="padding:40px;font-family:sans-serif;color:#c00">
        <b>Error loading components:</b><br>${err.message}
      </div>`;
    console.error(err);
  });
</script>
</body>
</html>
